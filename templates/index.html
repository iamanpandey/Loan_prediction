
<!DOCTYPE html>
<html>

<head>

<title>Loan Prediction System</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family: Arial, sans-serif;
}


body{

    min-height:100vh;
    background: linear-gradient(135deg,#667eea,#764ba2);

    display:flex;
    justify-content:center;
    align-items:center;

}


.container{

    width:850px;
    background:white;

    border-radius:20px;

    padding:35px;

    box-shadow:0px 15px 40px rgba(0,0,0,0.2);

}


h1{

    text-align:center;
    color:#333;
    margin-bottom:10px;

}


.subtitle{

    text-align:center;
    color:#777;
    margin-bottom:30px;

}



.form-grid{

    display:grid;
    grid-template-columns:1fr 1fr;
    gap:20px;

}



.input-box{

    display:flex;
    flex-direction:column;

}


label{

    font-weight:bold;
    margin-bottom:8px;
    color:#444;

}


input,select{


    padding:12px;

    border-radius:8px;

    border:1px solid #ccc;

    font-size:15px;

}



button{


    margin-top:30px;

    width:100%;

    padding:15px;

    border:none;

    border-radius:10px;

    background:#667eea;

    color:white;

    font-size:18px;

    cursor:pointer;

    transition:0.3s;

}



button:hover{

    background:#764ba2;

}



.result{

    margin-top:25px;

    text-align:center;

    font-size:22px;

    font-weight:bold;

    color:#222;

}


.footer{

    text-align:center;

    margin-top:20px;

    color:#888;

    font-size:14px;

}



@media(max-width:700px){

.form-grid{

grid-template-columns:1fr;

}

.container{

width:90%;

}


}


</style>


</head>


<body>


<div class="container">


<h1>🏦 Loan Approval Prediction</h1>


<p class="subtitle">
AI based Loan Eligibility Checking System using Machine Learning
</p>



<form action="/predict" method="post">


<div class="form-grid">


<div class="input-box">

<label>Gender</label>

<select name="Gender">

<option>Male</option>

<option>Female</option>

</select>

</div>



<div class="input-box">

<label>Marital Status</label>

<select name="Married">

<option>Yes</option>

<option>No</option>

</select>

</div>



<div class="input-box">

<label>Dependents</label>

<select name="Dependents">

<option>0</option>
<option>1</option>
<option>2</option>
<option>3+</option>

</select>

</div>



<div class="input-box">

<label>Education</label>

<select name="Education">

<option>Graduate</option>

<option>Not Graduate</option>

</select>

</div>



<div class="input-box">

<label>Self Employed</label>

<select name="Self_Employed">

<option>No</option>

<option>Yes</option>

</select>

</div>



<div class="input-box">

<label>Applicant Income</label>

<input type="number" name="ApplicantIncome">

</div>



<div class="input-box">

<label>Co Applicant Income</label>

<input type="number" name="CoapplicantIncome">

</div>



<div class="input-box">

<label>Loan Amount</label>

<input type="number" name="LoanAmount">

</div>



<div class="input-box">

<label>Loan Term</label>

<input type="number" name="Loan_Amount_Term" value="360">

</div>



<div class="input-box">

<label>Credit History</label>

<select name="Credit_History">

<option value="1">Good</option>

<option value="0">Bad</option>

</select>

</div>



<div class="input-box">

<label>Property Area</label>

<select name="Property_Area">

<option>Urban</option>

<option>Semiurban</option>

<option>Rural</option>

</select>

</div>



</div>



<button type="submit">

Predict Loan Status

</button>



</form>



<div class="result">

{{prediction}}

</div>



<div class="footer">

Powered by Machine Learning | SVM Model

</div>


</div>


</body>


</html>
